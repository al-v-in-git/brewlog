<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BrewLog{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="nav-shell">
            <a class="brand" href="{{ url_for('home') }}">
                <img class="brand-mark" src="{{ url_for('static', filename='logo.png') }}" alt="BrewLog">
                <span class="sr-only">BrewLog</span>
            </a>

            <nav class="site-nav">
                {% if session.get("user_id") %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('history') }}">History</a>
                <a href="{{ url_for('analytics') }}">Analytics</a>
                <a href="{{ url_for('calculator') }}">Calculator</a>
                <a href="{{ url_for('favorites') }}">Favorites</a>
                <a href="{{ url_for('add_brew') }}">Add Brew</a>
                <a href="{{ url_for('logout') }}">Logout</a>
                {% else %}
                <a href="{{ url_for('signup') }}">Signup</a>
                <a href="{{ url_for('login') }}">Login</a>
                {% endif %}
            </nav>

            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
                Theme
            </button>
        </div>
    </header>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
