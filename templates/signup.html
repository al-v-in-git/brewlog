{% extends "base.html" %}

{% block title %}Signup | BrewLog{% endblock %}

{% block content %}
<main class="shell">
    <section class="panel auth-panel">
        <p class="eyebrow">Create Account</p>
        <h1>Start your brewing log</h1>
        <p class="subtle">Create an account to save coffee recipes, ratings, and notes.</p>

        {% if error %}
        <p class="message error">{{ error }}</p>
        {% endif %}

        <form method="POST" class="stack-form">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" required>

            <label for="email">Email</label>
            <input id="email" type="email" name="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" required>

            <button class="button primary" type="submit">Sign Up</button>
        </form>

        <p class="subtle">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
    </section>
</main>
{% endblock %}
